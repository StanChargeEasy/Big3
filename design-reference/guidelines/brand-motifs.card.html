<!-- @dsCard group="Brand" viewport="700x220" name="Celestial Motifs" subtitle="Connectors, dividers & line-work that recur across the feed" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px 28px; }
  .stack { display: flex; flex-direction: column; gap: 20px; }
  .label { font-family: var(--font-sans); font-size: 9.5px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--text-muted); width: 130px; flex: none; }
  .line { display: flex; align-items: center; gap: 18px; }

  /* trinity connector: moon — asc — sun joined by a thin rule */
  .connector { display: flex; align-items: center; gap: 10px; }
  .connector img { height: 20px; }
  .connector .rule { width: 46px; height: 1px; background: var(--brand-primary); opacity: .5; }

  /* divider with end glyphs */
  .divider { display: flex; align-items: center; gap: 10px; flex: 1; }
  .divider .rule { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--brand-gold), transparent); }
  .divider img { height: 18px; }

  /* dotted halftone texture */
  .dots { width: 80px; height: 40px; background-image: radial-gradient(var(--brand-gold) 1.3px, transparent 1.3px); background-size: 9px 9px; opacity: .7; }

  /* thin constellation triangle */
  .tri { width: 70px; height: 48px; position: relative; }
  .tri svg { width: 100%; height: 100%; }
</style>
</head>
<body>
  <div class="stack">
    <div class="line">
      <span class="label">Trinity connector</span>
      <div class="connector">
        <img src="../assets/icons/glyph-moon.png" alt=""><span class="rule"></span>
        <img src="../assets/icons/glyph-libra.png" alt="" style="height:26px"><span class="rule"></span>
        <img src="../assets/icons/glyph-sun.png" alt="">
      </div>
    </div>
    <div class="line">
      <span class="label">Editorial divider</span>
      <div class="divider">
        <img src="../assets/icons/glyph-moon.png" alt="">
        <span class="rule"></span>
        <img src="../assets/icons/glyph-sun.png" alt="">
      </div>
    </div>
    <div class="line">
      <span class="label">Texture & line</span>
      <div class="dots"></div>
      <div class="tri">
        <svg viewBox="0 0 70 48" fill="none">
          <circle cx="10" cy="14" r="3" fill="var(--moon-color)"/>
          <circle cx="60" cy="10" r="3" fill="var(--sun-color)"/>
          <circle cx="35" cy="44" r="3" fill="var(--asc-color)"/>
          <path d="M10 14 L60 10 L35 44 Z" stroke="var(--b3a-ink)" stroke-width="1.4"/>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
