<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Display → caption, with role mapping" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px 28px; }
  .r { display: flex; align-items: baseline; gap: 18px; padding: 7px 0; border-bottom: 1px solid var(--border-subtle); }
  .r:last-child { border-bottom: 0; }
  .sample { color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tag { margin-left: auto; font-family: var(--font-body); font-size: 10.5px; color: var(--text-muted); letter-spacing: .04em; white-space: nowrap; }
  .serif { font-family: var(--font-serif); }
  .sans { font-family: var(--font-sans); }
  .caps { text-transform: uppercase; letter-spacing: .16em; }
</style>
</head>
<body>
  <div class="r"><span class="sample serif" style="font-size:40px;font-weight:700">Celestial</span><span class="tag">Display · Playfair 700 · 54–72</span></div>
  <div class="r"><span class="sample serif" style="font-size:28px;font-weight:600">New moon in Libra</span><span class="tag">H1 / H2 · Playfair 600 · 30–40</span></div>
  <div class="r"><span class="sample sans caps" style="font-size:20px;font-weight:600">Aries Season</span><span class="tag">Title · Jost 600 · 20–24</span></div>
  <div class="r"><span class="sample sans caps" style="font-size:13px;font-weight:600;color:var(--brand-accent)">Consultation Review</span><span class="tag">Eyebrow · Jost 600 · 13 · +.16em</span></div>
  <div class="r"><span class="sample" style="font-family:var(--font-body);font-size:16px">Read the weather of a personality.</span><span class="tag">Body · Mulish 400 · 16</span></div>
  <div class="r"><span class="sample" style="font-family:var(--font-body);font-size:12px;color:var(--text-muted)">325 Likes · 1 day ago</span><span class="tag">Caption · Mulish 400 · 12</span></div>
</body>
</html>
