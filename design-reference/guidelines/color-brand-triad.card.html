<!-- @dsCard group="Colors" viewport="700x215" name="Brand Triad" subtitle="Sun · Moon · Ascendant — the three pillars" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); }
  .wrap { display: flex; gap: 14px; padding: 22px; }
  .sw {
    flex: 1; border-radius: var(--radius-md); overflow: hidden;
    box-shadow: var(--shadow-sm); background: var(--surface-card);
    border: 1px solid var(--border-subtle);
  }
  .chip { height: 92px; display: flex; align-items: center; justify-content: center; }
  .chip img { width: 42px; height: 42px; object-fit: contain; }
  .meta { padding: 10px 12px 12px; }
  .nm { font-family: var(--font-sans); font-weight: 600; font-size: 12px;
        letter-spacing: .14em; text-transform: uppercase; color: var(--text-primary); }
  .role { font-family: var(--font-body); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .hex { font-family: var(--font-body); font-size: 11px; color: var(--text-secondary); margin-top: 6px; letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw">
      <div class="chip" style="background: var(--b3a-coral);"><img src="../assets/icons/glyph-sun.png" alt="sun" style="filter: brightness(0) invert(1); opacity:.92"></div>
      <div class="meta"><div class="nm">Sun · Coral</div><div class="role">Energy, action, accent</div><div class="hex">#F27678</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--b3a-wine);"><img src="../assets/icons/glyph-moon.png" alt="moon" style="filter: brightness(0) invert(1); opacity:.92"></div>
      <div class="meta"><div class="nm">Moon · Wine</div><div class="role">Primary, emotive depth</div><div class="hex">#A4426C</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--b3a-gold);"><img src="../assets/icons/glyph-libra.png" alt="asc" style="width:54px;height:54px; filter: brightness(0) invert(1); opacity:.92"></div>
      <div class="meta"><div class="nm">Ascendant · Gold</div><div class="role">Secondary, stars, ritual</div><div class="hex">#E6A44E</div></div>
    </div>
  </div>
</body>
</html>
