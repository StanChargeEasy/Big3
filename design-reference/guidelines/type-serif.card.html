<!-- @dsCard group="Type" viewport="700x230" name="Serif Display — Playfair" subtitle="Editorial quotes & emotive hero lines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px 28px; }
  .eyebrow { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--brand-accent); }
  .big { font-family: var(--font-serif); font-weight: 700; font-size: 46px; line-height: 1.08; color: var(--text-primary); margin-top: 14px; }
  .big em { font-style: italic; color: var(--brand-primary); }
  .meta { margin-top: 16px; font-family: var(--font-body); font-size: 12px; color: var(--text-muted); letter-spacing: .03em; }
  .meta b { color: var(--text-secondary); font-weight: 600; }
</style>
</head>
<body>
  <div class="eyebrow">The information you should know</div>
  <div class="big">Sometimes later<br>becomes <em>never.</em></div>
  <div class="meta"><b>Playfair Display</b> · 400 / 500 / 600 / 700 / 800 · roman &amp; italic · high contrast, centered editorial setting</div>
</body>
</html>
