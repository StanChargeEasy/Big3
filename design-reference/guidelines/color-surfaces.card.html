<!-- @dsCard group="Colors" viewport="700x160" name="Surfaces & Paper" subtitle="Warm cream grounds and color blocks" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .cell { text-align: left; }
  .b { height: 70px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  .n { font-family: var(--font-sans); font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-primary); margin-top: 8px; }
  .h { font-family: var(--font-body); font-size: 9.5px; color: var(--text-muted); margin-top: 2px; }
  .dark .n { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="b" style="background:var(--b3a-cream)"></div><div class="n">Cream</div><div class="h">Page · #FEF9F5</div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-ivory)"></div><div class="n">Ivory</div><div class="h">Paper · #FBF3EC</div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-sand)"></div><div class="n">Sand</div><div class="h">Tan card · #F3E7DC</div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-blush)"></div><div class="n">Blush</div><div class="h">Coral wash · #F9E6E2</div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-plum-wash)"></div><div class="n">Plum wash</div><div class="h">Wine wash · #EFD9E1</div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-charcoal)"></div><div class="n">Charcoal</div><div class="h">Inverse · #3D4047</div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-ink)"></div><div class="n">Ink</div><div class="h">Text · #1B1B1B</div></div>
  </div>
</body>
</html>
