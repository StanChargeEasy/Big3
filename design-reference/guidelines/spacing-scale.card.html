<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base · airy editorial rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px 26px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { text-align: center; }
  .bar { background: var(--brand-primary); border-radius: var(--radius-xs); width: 26px; opacity: .9; }
  .n { font-family: var(--font-sans); font-size: 10px; font-weight: 600; letter-spacing: .08em; color: var(--text-primary); margin-top: 8px; }
  .v { font-family: var(--font-body); font-size: 9.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:8px"></div><div class="n">1</div><div class="v">4</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="n">2</div><div class="v">8</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="n">3</div><div class="v">12</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="n">4</div><div class="v">16</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="n">5</div><div class="v">20</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="n">6</div><div class="v">24</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="n">8</div><div class="v">32</div></div>
    <div class="item"><div class="bar" style="height:80px"></div><div class="n">10</div><div class="v">40</div></div>
    <div class="item"><div class="bar" style="height:96px"></div><div class="n">12</div><div class="v">48</div></div>
  </div>
</body>
</html>
