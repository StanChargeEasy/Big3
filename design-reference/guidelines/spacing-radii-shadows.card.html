<!-- @dsCard group="Spacing" viewport="700x170" name="Radii & Shadows" subtitle="Restrained corners · soft wine-tinted elevation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px 26px; }
  .grid { display: flex; gap: 26px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; gap: 14px; }
  .box { width: 64px; height: 64px; background: var(--surface-card); border: 1px solid var(--border-subtle); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px; }
  .lab { font-family: var(--font-sans); font-size: 9px; font-weight: 600; letter-spacing: .06em; color: var(--text-muted); }
  .sep { width: 1px; align-self: stretch; background: var(--border-subtle); }
  .sh { width: 72px; height: 64px; background: var(--surface-card); border-radius: var(--radius-md); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="col">
      <div class="box" style="border-radius:var(--radius-xs)"><span class="lab">xs 3</span></div>
      <div class="box" style="border-radius:var(--radius-sm)"><span class="lab">sm 6</span></div>
      <div class="box" style="border-radius:var(--radius-md)"><span class="lab">md 10</span></div>
      <div class="box" style="border-radius:var(--radius-lg)"><span class="lab">lg 16</span></div>
      <div class="box" style="border-radius:var(--radius-pill)"><span class="lab">pill</span></div>
    </div>
    <div class="sep"></div>
    <div class="col">
      <div class="sh" style="box-shadow:var(--shadow-sm)"><span class="lab">sm</span></div>
      <div class="sh" style="box-shadow:var(--shadow-card)"><span class="lab">card</span></div>
      <div class="sh" style="box-shadow:var(--shadow-float)"><span class="lab">float</span></div>
      <div class="sh" style="box-shadow:var(--shadow-lg)"><span class="lab">lg</span></div>
    </div>
  </div>
</body>
</html>
