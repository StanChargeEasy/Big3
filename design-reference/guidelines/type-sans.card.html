<!-- @dsCard group="Type" viewport="700x250" name="Geometric Sans — Jost" subtitle="Wordmark, eyebrows & tracked ALL-CAPS labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px 28px; font-family: var(--font-sans); }
  .wordmark { font-weight: 500; font-size: 30px; letter-spacing: .34em; text-transform: uppercase; color: var(--text-primary); }
  .stack { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
  .eyebrow { font-weight: 600; font-size: 13px; letter-spacing: .18em; text-transform: uppercase; color: var(--brand-accent); }
  .label { font-weight: 600; font-size: 13px; letter-spacing: .16em; text-transform: uppercase; color: var(--brand-primary); }
  .gold { color: var(--brand-gold); }
  .row { display: flex; gap: 24px; align-items: baseline; flex-wrap: wrap; }
  .weights span { margin-right: 16px; font-size: 18px; color: var(--text-primary); letter-spacing: .02em; }
  .meta { margin-top: 18px; font-family: var(--font-body); font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wordmark">BIG&nbsp;3&nbsp;ASTROLOGY</div>
  <div class="stack">
    <div class="row">
      <span class="eyebrow">Consultation Review</span>
      <span class="label">Mantras for Aries Season</span>
      <span class="label gold">Welcome October</span>
    </div>
    <div class="weights">
      <span style="font-weight:300">Light</span>
      <span style="font-weight:400">Regular</span>
      <span style="font-weight:500">Medium</span>
      <span style="font-weight:600">Semibold</span>
      <span style="font-weight:700">Bold</span>
    </div>
  </div>
  <div class="meta"><b style="font-weight:600;color:var(--text-secondary)">Jost</b> · geometric, even stroke · wide tracking on caps · the brand's structural voice</div>
</body>
</html>
