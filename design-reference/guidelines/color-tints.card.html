<!-- @dsCard group="Colors" viewport="700x150" name="Brand Tints & Shades" subtitle="Working values across the triad" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; }
  .cell { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-subtle); background: var(--surface-card); }
  .b { height: 56px; }
  .t { padding: 6px 7px 8px; }
  .n { font-family: var(--font-sans); font-size: 9.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-primary); }
  .h { font-family: var(--font-body); font-size: 9px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="b" style="background:var(--b3a-coral-soft)"></div><div class="t"><div class="n">Coral soft</div><div class="h">#F8A6A6</div></div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-coral)"></div><div class="t"><div class="n">Coral</div><div class="h">#F27678</div></div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-coral-600)"></div><div class="t"><div class="n">Coral 600</div><div class="h">#E85F61</div></div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-wine-700)"></div><div class="t"><div class="n">Wine 700</div><div class="h">#8E3760</div></div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-wine)"></div><div class="t"><div class="n">Wine</div><div class="h">#A4426C</div></div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-wine-deep)"></div><div class="t"><div class="n">Wine deep</div><div class="h">#7C2F50</div></div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-gold)"></div><div class="t"><div class="n">Gold</div><div class="h">#E6A44E</div></div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-amber)"></div><div class="t"><div class="n">Amber</div><div class="h">#E5A34D</div></div></div>
    <div class="cell"><div class="b" style="background:var(--b3a-gold-deep)"></div><div class="t"><div class="n">Gold deep</div><div class="h">#C9852F</div></div></div>
  </div>
</body>
</html>
